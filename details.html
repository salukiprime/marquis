<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Atelier | Marquis</title>
    <meta name="description" content="View detailed description and configure your Marquis">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Верхняя мини-навигация -->
    <div class="top-nav">

        <div class="nav-links">
            <a href="about.html">О проекте</a>
        </div>
    </div>

    <!-- Главная шапка -->
    <header class="main-header">
        <a href="index.html" class="logo">
            <div class="logo-icon"></div>
        </a>
        <!-- Гамбургер-кнопка для мобильных -->
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="main-nav" id="main-nav">
            <ul>
                <li><a href="index.html">Le Garage</a></li>
                <li><a href="catalog.html">La Collection</a></li>
                <li><a href="details.html" class="active">L'Atelier</a></li>
                <li><a href="maison.html">La Maison</a></li>
            </ul>
        </nav>
    </header>

    <!-- Главный контент страницы деталей -->
    <main id="details-container">
        <!-- Динамический контент заполняется через details.js -->
    </main>

    <div id="model-content">
        <!-- Контент внедряется JS -->
    </div>

    <div class="atelier-form-section" id="atelier-form-section" style="display: none;">
        <div class="container">
            <div class="atelier-header">
                <h2>Конфигурация в L'Atelier</h2>
                <p>Настройте свой автомобиль и подтвердите заказ.</p>
            </div>
            
            <div class="configurator-grid">
                <div class="form-container" style="margin: 0;">
                    <form id="vehicle-form" novalidate>
                        <input type="hidden" id="model" name="model">
                        
                        <div class="form-group">
                        <label for="year" class="form-label">Год Выпуска *</label>
                        <select id="year" name="year" class="form-control form-select">
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="engine" class="form-label">Вариант Двигателя *</label>
                        <select id="engine" name="engine" class="form-control form-select">
                            <option value="">Выберите двигатель...</option>
                            <!-- Options injected by JS based on model -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="color" class="form-label">Цвет Кузова</label>
                        <!-- Цветовые свотчи (заполняются JS) -->
                        <div class="color-swatches" id="color-swatches"></div>
                        <span class="color-name-label" id="color-name-label"></span>
                        <input type="hidden" id="color" name="color">
                    </div>

                        <div class="form-actions btn-center-wrapper">
                            <button type="submit" class="btn btn-primary btn-atelier-submit">Завершить Конфигурацию и Добавить в Le Garage</button>
                        </div>
                    </form>

                    <!-- Превью конфигурации -->
                    <div class="config-summary" id="config-summary">
                        <h4>Ваша Конфигурация</h4>
                        <div class="config-summary-grid" id="config-summary-grid">
                            <!-- Заполняется JS -->
                        </div>
                    </div>
                </div>
                <!-- Right side: specifications -->
                <div class="specs-side">
                    <div id="dynamic-specs-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Подвал (Footer) -->
    <footer>
        <p>&copy; <span id="current-year"></span> <span>Marquis Automobile. Искусство Превосходства.</span></p>
    </footer>

    <!-- Скрипты -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/details.js"></script>
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
        // Гамбургер-меню
        document.getElementById('hamburger-btn').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('main-nav').classList.toggle('open');
        });
    </script>
</body>
</html>
